version: "3.9"

services:
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: backend
    restart: always
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://root:root@mongo:27017
    ports:
      - "5000:5000"
    # optional if you want live reload during dev:
    # volumes:
    #   - ./backend:/app

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    # optional if you want live reload during dev:
    # volumes:
    #   - ./frontend:/app

volumes:
  mongo_data:
